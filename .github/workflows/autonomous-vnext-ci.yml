name: Autonomous vNext CI

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: autonomous-vnext-${{ github.event.pull_request.head.sha || github.sha }}
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    env:
      SUBMITTED_SHA: ${{ github.event.pull_request.head.sha || github.sha }}

    steps:
      - name: Check out submitted source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ env.SUBMITTED_SHA }}
          fetch-depth: 1
          persist-credentials: false
          show-progress: false

      - name: Assert exact clean source
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$SUBMITTED_SHA"
          test -z "$(git status --porcelain)"

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"

      - name: Install pinned test dependency
        run: python -m pip install --disable-pip-version-check --no-cache-dir 'pytest==8.4.2'

      - name: Run tests
        run: python -m pytest -q

      - name: Run cognitive runtime smoke
        run: |
          python -m autonomous_vnext.cognitive_runtime \
            "ci federation coordination smoke" \
            --output /tmp/cognitive_runtime_report.json
          test -s /tmp/cognitive_runtime_report.json

      - name: Emit Codex federation status
        run: python scripts/emit_codex_federation_status.py --pretty

      - name: Validate public mirror manifest
        run: python -m json.tool public_mirrors.json > /tmp/public_mirrors.validated.json

      - name: Evaluate empty federation inbox
        run: python scripts/emit_codex_federation_status.py --pretty | python -c 'import json, subprocess, sys; payload=json.load(sys.stdin); subprocess.run(["python", "-m", "autonomous_vnext.federation_kernel", "--authoritative-head", payload["head"], "--pretty"], check=True)'

      - name: Validate local federation status writer
        run: |
          python scripts/write_local_federation_status.py --output /tmp/local_federation_status.json
          python -m json.tool /tmp/local_federation_status.json > /tmp/local_federation_status.validated.json

      - name: Validate generic federation message writer
        run: |
          python scripts/write_federation_message.py \
            --agent safari_cloud \
            --type status \
            --cwd /workspace/0 \
            --branch work \
            --commit "$(git rev-parse HEAD)" \
            --blocker no_remote \
            --next-action "export patch proposal" \
            --inbox /tmp/FederationInbox
          python -m json.tool /tmp/FederationInbox/safari/status.json > /tmp/safari_status.validated.json

      - name: Validate patch bundle writer
        run: python -m pytest -q tests/test_write_patch_bundle.py

      - name: Validate patch proposal verifier
        run: python -m pytest -q tests/test_verify_patch_proposals.py

      - name: Validate Safari patch workflow
        run: python -m pytest -q tests/test_safari_patch_workflow.py

      - name: Validate mobile status and bridge signal emitters
        run: python -m pytest -q tests/test_write_mobile_federation_status.py tests/test_emit_bridge_signal.py

      - name: Validate federation dispatch and routine runner
        run: python -m pytest -q tests/test_write_federation_dispatch.py tests/test_run_federation_routine.py

      - name: Validate federation contact recorder
        run: python -m pytest -q tests/test_record_federation_contact.py tests/test_stage_safari_dispatch.py tests/test_watch_safari_dispatch_send.py

      - name: Validate federation relay summary
        run: python -m pytest -q tests/test_write_federation_relay_summary.py tests/test_run_safari_relay_retry.py

      - name: Validate guarded patch apply helper
        run: python -m pytest -q tests/test_apply_verified_patch.py

      - name: Validate federation state report
        run: python -m pytest -q tests/test_federation_state_report.py

      - name: Record exact-head evidence
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p reports/autonomous-vnext
          {
            printf 'repository=%s\n' "$GITHUB_REPOSITORY"
            printf 'source_sha=%s\n' "$(git rev-parse HEAD)"
            printf 'submitted_sha=%s\n' "$SUBMITTED_SHA"
            printf 'workflow_run=%s\n' "$GITHUB_RUN_ID"
            printf 'workflow_attempt=%s\n' "$GITHUB_RUN_ATTEMPT"
            printf 'python=%s\n' "$(python --version 2>&1)"
            printf 'pytest=%s\n' "$(python -m pytest --version 2>&1)"
            printf 'generated_utc=%s\n' "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } > reports/autonomous-vnext/run-summary.txt
          git status --porcelain > reports/autonomous-vnext/worktree.txt
          sha256sum public_mirrors.json .github/workflows/autonomous-vnext-ci.yml > reports/autonomous-vnext/source.sha256

      - name: Upload exact-head evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: autonomous-vnext-${{ env.SUBMITTED_SHA }}
          path: reports/autonomous-vnext
          if-no-files-found: error
          retention-days: 30
