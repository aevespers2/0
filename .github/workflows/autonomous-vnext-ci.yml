name: Autonomous vNext CI

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: python -m pip install --upgrade pip pytest

      - name: Run tests
        run: python -m pytest -q

      - name: Run cognitive runtime smoke
        run: |
          python -m autonomous_vnext.cognitive_runtime \
            "ci federation coordination smoke" \
            --output /tmp/cognitive_runtime_report.json
          test -s /tmp/cognitive_runtime_report.json

      - name: Emit Codex federation status
        run: python scripts/emit_codex_federation_status.py --pretty

      - name: Validate public mirror manifest
        run: python -m json.tool public_mirrors.json > /tmp/public_mirrors.validated.json

      - name: Evaluate empty federation inbox
        run: python scripts/emit_codex_federation_status.py --pretty | python -c 'import json, subprocess, sys; payload=json.load(sys.stdin); subprocess.run(["python", "-m", "autonomous_vnext.federation_kernel", "--authoritative-head", payload["head"], "--pretty"], check=True)'

      - name: Validate local federation status writer
        run: |
          python scripts/write_local_federation_status.py --output /tmp/local_federation_status.json
          python -m json.tool /tmp/local_federation_status.json > /tmp/local_federation_status.validated.json

      - name: Validate generic federation message writer
        run: |
          python scripts/write_federation_message.py \
            --agent safari_cloud \
            --type status \
            --cwd /workspace/0 \
            --branch work \
            --commit "$(git rev-parse HEAD)" \
            --blocker no_remote \
            --next-action "export patch proposal" \
            --inbox /tmp/FederationInbox
          python -m json.tool /tmp/FederationInbox/safari/status.json > /tmp/safari_status.validated.json

      - name: Validate patch bundle writer
        run: python -m pytest -q tests/test_write_patch_bundle.py

      - name: Validate patch proposal verifier
        run: python -m pytest -q tests/test_verify_patch_proposals.py

      - name: Validate Safari patch workflow
        run: python -m pytest -q tests/test_safari_patch_workflow.py

      - name: Validate mobile status + bridge signal emitters
        run: python -m pytest -q tests/test_write_mobile_federation_status.py tests/test_emit_bridge_signal.py

      - name: Validate federation dispatch and routine runner
        run: python -m pytest -q tests/test_write_federation_dispatch.py tests/test_run_federation_routine.py

      - name: Validate federation contact recorder
        run: python -m pytest -q tests/test_record_federation_contact.py tests/test_stage_safari_dispatch.py

      - name: Validate guarded patch apply helper
        run: python -m pytest -q tests/test_apply_verified_patch.py

      - name: Validate federation state report
        run: python -m pytest -q tests/test_federation_state_report.py
