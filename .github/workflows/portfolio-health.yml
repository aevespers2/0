name: Portfolio Health Control Plane

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: read
  issues: write

env:
  PORTFOLIO_OWNER: aevespers2

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out trusted main scanner
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: main
          persist-credentials: false

      - name: Record trusted scanner head
        run: |
          mkdir -p reports/portfolio-health
          git rev-parse HEAD | tee reports/portfolio-health/scanner-head.txt

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"

      - name: Run exact-state portfolio scan
        id: scan
        continue-on-error: true
        env:
          PORTFOLIO_TOKEN: ${{ secrets.PORTFOLIO_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python scripts/portfolio_health.py
          status=$?
          printf '%s\n' "$status" > reports/portfolio-health/scanner-exit-code.txt
          exit "$status"

      - name: Retain scanner evidence
        if: always()
        run: |
          cp portfolio-health.json portfolio-health.md reports/portfolio-health/
          python --version > reports/portfolio-health/python-version.txt 2>&1
          sha256sum reports/portfolio-health/* > reports/portfolio-health/SHA256SUMS

      - name: Upload deterministic evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: portfolio-health-${{ github.run_id }}
          path: reports/portfolio-health
          if-no-files-found: error
          retention-days: 90

      - name: Synchronize central health issue
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          title="Portfolio health: attention required"
          count="$(python -c 'import json; print(json.load(open("portfolio-health.json"))["finding_count"])')"
          errors="$(python -c 'import json; print(len(json.load(open("portfolio-health.json"))["errors"]))')"
          existing="$(gh issue list --state open --search "${title} in:title" --limit 100 --json number --jq '.[0].number // empty')"
          if [[ "$count" -gt 0 || "$errors" -gt 0 ]]; then
            if [[ -n "$existing" ]]; then
              gh issue edit "$existing" --body-file portfolio-health.md
            else
              gh issue create --title "$title" --body-file portfolio-health.md --label portfolio-health || \
                gh issue create --title "$title" --body-file portfolio-health.md
            fi
          elif [[ -n "$existing" ]]; then
            gh issue close "$existing" --comment "Automated exact-state scan found no significant repository-health findings or scan errors."
          fi

      - name: Fail closed on scan errors
        if: steps.scan.outcome != 'success'
        run: exit 1
