name: Gods Jira and Prometheus Control Plane

on:
  pull_request:
    paths:
      - "integrations/gods/**"
      - "scripts/gods_control.py"
      - "scripts/portfolio_health.py"
      - "tests/test_gods_control.py"
      - ".github/workflows/gods-observability.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: gods-observability-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    env:
      SUBMITTED_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
    steps:
      - name: Check out trusted or exact submitted head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ env.SUBMITTED_SHA }}
          fetch-depth: 1
          persist-credentials: false
          show-progress: false

      - name: Assert exact clean source
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$SUBMITTED_SHA"
          test -z "$(git status --porcelain)"

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"

      - name: Install test runner
        run: python -m pip install --disable-pip-version-check pytest

      - name: Run focused tests
        run: pytest -q tests/test_gods_control.py

      - name: Generate portfolio report locally
        if: github.event_name != 'pull_request'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PORTFOLIO_OWNER: aevespers2
        run: python scripts/portfolio_health.py

      - name: Generate Prometheus exposition locally
        if: github.event_name != 'pull_request'
        run: python scripts/gods_control.py prometheus

      - name: Exercise Jira integration in dry-run mode
        env:
          JIRA_BASE_URL: https://example.atlassian.net
          JIRA_PROJECT_KEY: QSO
          JIRA_EMAIL: ci@example.invalid
          JIRA_API_TOKEN: dry-run-only
        run: |
          if [ ! -f portfolio-health.json ]; then
            cat > portfolio-health.json <<'JSON'
          {"findings":[{"severity":"high","repo":"aevespers2/example","kind":"failed_ci","summary":"fixture"}],"errors":[]}
          JSON
          fi
          python scripts/gods_control.py jira --dry-run

      - name: Assert external-write boundary
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          text = Path('.github/workflows/gods-observability.yml').read_text(encoding='utf-8')
          forbidden = [
              'sche' + 'dule:',
              'PORTFOLIO_' + 'TOKEN',
              'secrets.' + 'JIRA_API_TOKEN',
              'secrets.' + 'PROMETHEUS_PUSHGATEWAY_URL',
              'run: python scripts/gods_control.py ' + 'jira',
              'curl --fail --silent --show-error ' + '\\',
          ]
          found = [term for term in forbidden if term in text]
          assert not found, f'external-write surface present: {found}'
          PY
          mkdir -p artifacts/gods
          printf '%s\n' \
            "external_jira_write=blocked" \
            "external_metrics_push=blocked" \
            "scheduled_execution=blocked" \
            "source_sha=$(git rev-parse HEAD)" \
            > artifacts/gods/external-write-boundary.txt

      - name: Record evidence
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/gods
          {
            printf 'repository=%s\n' "$GITHUB_REPOSITORY"
            printf 'source_sha=%s\n' "$(git rev-parse HEAD)"
            printf 'workflow_run=%s\n' "$GITHUB_RUN_ID"
            printf 'workflow_attempt=%s\n' "$GITHUB_RUN_ATTEMPT"
            printf 'python=%s\n' "$(python --version 2>&1)"
            printf 'generated_utc=%s\n' "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } > artifacts/gods/run-summary.txt
          find artifacts/gods -maxdepth 1 -type f ! -name sha256.txt -print0 \
            | sort -z \
            | xargs -0 -r sha256sum > artifacts/gods/sha256.txt

      - name: Upload Gods evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: gods-observability-${{ env.SUBMITTED_SHA }}
          path: |
            portfolio-health.json
            portfolio-health.md
            artifacts/gods/
          if-no-files-found: warn
          retention-days: 30
