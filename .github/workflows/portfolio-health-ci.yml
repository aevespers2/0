name: Portfolio Health Candidate CI

on:
  pull_request:
    paths:
      - "scripts/portfolio_health.py"
      - "tests/test_portfolio_health.py"
      - "governance/portfolio-agents.json"
      - ".github/workflows/portfolio-health*.yml"
      - "docs/portfolio-health-control-plane.md"
      - "punchlist.md"

permissions:
  contents: read

concurrency:
  group: portfolio-health-ci-${{ github.event.pull_request.number }}-${{ github.event.pull_request.head.sha }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SUBMITTED_SHA: ${{ github.event.pull_request.head.sha }}
      PYTHONDONTWRITEBYTECODE: "1"

    steps:
      - name: Check out exact submitted head
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ${{ env.SUBMITTED_SHA }}
          fetch-depth: 1
          persist-credentials: false
          show-progress: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.13"
          cache: ""

      - name: Assert immutable clean source
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$SUBMITTED_SHA"
          test -z "$(git status --porcelain)"
          test -f scripts/portfolio_health.py
          test -f tests/test_portfolio_health.py
          test -f governance/portfolio-agents.json

      - name: Install pinned test dependency
        run: python -m pip install --disable-pip-version-check --no-cache-dir 'pytest==8.4.2'

      - name: Run scanner regressions
        shell: bash
        run: |
          set -euo pipefail
          evidence="$RUNNER_TEMP/portfolio-health-ci"
          mkdir -p "$evidence"
          python -m py_compile scripts/portfolio_health.py
          python -m pytest -q tests/test_portfolio_health.py \
            --junitxml="$evidence/pytest.xml" \
            | tee "$evidence/pytest.log"

      - name: Validate agent registry and safety boundary
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path
          data = json.loads(Path("governance/portfolio-agents.json").read_text(encoding="utf-8"))
          ids = [agent["id"] for agent in data["agents"]]
          assert len(ids) == len(set(ids))
          assert {"sentinel", "ci_healer", "provenance_steward", "dependency_curator", "incident_custodian", "release_gatekeeper", "flow_orchestrator"} <= set(ids)
          assert data["authority_boundary"]["automatic_merge"] is False
          assert data["authority_boundary"]["production_deployment"] is False
          assert data["authority_boundary"]["credential_changes"] is False
          assert data["authority_boundary"]["infrastructure_apply"] is False
          PY

      - name: Record deterministic exact-head evidence
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          evidence="$RUNNER_TEMP/portfolio-health-ci"
          mkdir -p "$evidence"
          printf '%s\n' "$SUBMITTED_SHA" > "$evidence/exact-head.txt"
          python --version > "$evidence/python-version.txt" 2>&1
          python -m pytest --version > "$evidence/pytest-version.txt" 2>&1
          sha256sum \
            scripts/portfolio_health.py \
            tests/test_portfolio_health.py \
            governance/portfolio-agents.json \
            .github/workflows/portfolio-health-ci.yml \
            .github/workflows/portfolio-health.yml \
            docs/portfolio-health-control-plane.md \
            punchlist.md \
            > "$evidence/input-sha256.txt"
          git diff --exit-code
          git diff --cached --exit-code
          test -z "$(git status --porcelain)"

      - name: Upload retained candidate evidence
        if: always()
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08
        with:
          name: portfolio-health-ci-${{ env.SUBMITTED_SHA }}
          path: ${{ runner.temp }}/portfolio-health-ci
          if-no-files-found: error
          retention-days: 90
