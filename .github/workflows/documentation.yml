name: Documentation

on:
  pull_request:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'requirements-docs.txt'
      - 'README.md'
      - 'taskchain.md'
      - 'release.md'
      - 'changelog.md'
      - '.github/workflows/documentation.yml'
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'requirements-docs.txt'
      - 'README.md'
      - 'taskchain.md'
      - 'release.md'
      - 'changelog.md'
      - '.github/workflows/documentation.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: documentation-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out exact submitted source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false

      - name: Assert exact source identity
        env:
          EXPECTED_HEAD: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$EXPECTED_HEAD"
          printf 'verified_head=%s\n' "$EXPECTED_HEAD"

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements-docs.txt

      - name: Install pinned documentation dependencies
        run: python -m pip install --requirement requirements-docs.txt

      - name: Build documentation strictly
        run: mkdocs build --strict --site-dir site

      - name: Validate required files and local Markdown links
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          required = [
              Path('README.md'),
              Path('taskchain.md'),
              Path('release.md'),
              Path('changelog.md'),
              Path('mkdocs.yml'),
              Path('docs/index.md'),
              Path('docs/architecture.md'),
              Path('docs/alistaire-role.md'),
              Path('docs/contracts.md'),
              Path('docs/autonomous-development.md'),
              Path('docs/development.md'),
              Path('docs/operations.md'),
              Path('docs/security.md'),
              Path('docs/release-evidence.md'),
          ]
          missing_required = [str(path) for path in required if not path.exists()]
          if missing_required:
              raise SystemExit('Missing required files:\n' + '\n'.join(missing_required))

          pattern = re.compile(r'\[[^\]]*\]\(([^)]+)\)')
          missing_links = []
          for source in Path('docs').rglob('*.md'):
              text = source.read_text(encoding='utf-8')
              for raw_target in pattern.findall(text):
                  target = raw_target.strip().strip('<>')
                  if target.startswith(('http:', 'https:', 'mailto:', '#')):
                      continue
                  clean = target.split('#', 1)[0].split('?', 1)[0]
                  if not clean:
                      continue
                  if not (source.parent / clean).resolve().exists():
                      missing_links.append(f'{source}: {target}')
          if missing_links:
              raise SystemExit('Missing local links:\n' + '\n'.join(missing_links))
          PY

      - name: Record deterministic documentation evidence
        if: always()
        run: |
          set -euo pipefail
          mkdir -p reports/documentation
          git rev-parse HEAD > reports/documentation/exact-head.txt
          python --version > reports/documentation/python-version.txt 2>&1
          python -m pip freeze > reports/documentation/dependencies.txt
          mkdocs --version > reports/documentation/mkdocs-version.txt 2>&1 || true
          if [ -d site ]; then
            tar --sort=name --mtime='UTC 1970-01-01' --owner=0 --group=0 --numeric-owner -czf reports/documentation/site.tar.gz site
          fi
          python - <<'PY'
          from hashlib import sha256
          from pathlib import Path

          root = Path('reports/documentation')
          lines = []
          for path in sorted(root.rglob('*')):
              if not path.is_file() or path.name == 'SHA256SUMS':
                  continue
              lines.append(f'{sha256(path.read_bytes()).hexdigest()}  {path.relative_to(root).as_posix()}')
          (root / 'SHA256SUMS').write_text('\n'.join(lines) + '\n', encoding='utf-8')
          PY

      - name: Upload documentation evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: documentation-evidence-${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          path: reports/documentation
          if-no-files-found: error
          retention-days: 30
